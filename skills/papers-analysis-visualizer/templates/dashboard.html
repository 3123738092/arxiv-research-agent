<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Exploration Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
/* ═══ 色彩体系 ═══
   背景色:      #F7F8FA  柔和浅灰蓝
   结构色:      #1F2447  Deep Ink — 标题、模块头、关键数字
   主蓝色:      #8FB8C8  Main Blue — 网络普通节点
   强调紫:      #7B5AA5  Accent Purple — 核心节点、趋势图、高亮
   柔和衬底:    #EEE8F6  Soft Lilac Mist — 标签底、选中态
   边线色:      #D9DEE7  — 边框、分隔线、network 连线
   ═══════════════════════════════════════ */

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #F7F8FA; color: #2d3436; }

/* ── Header ── */
.header {
  background: #fff;
  border-bottom: 2px solid #D9DEE7;
  padding: 22px 32px;
}
.header h1 { font-size: 26px; font-weight: 700; color: #1F2447; letter-spacing: -0.3px; }
.header .subtitle { font-size: 13px; color: #534AB7; margin-top: 4px; }

/* ── Overview ── */
.overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 18px 32px; }
.ov-card { background: #fff; border-radius: 10px; padding: 20px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.05); text-align: center; }
.ov-card .value { font-size: 28px; font-weight: 700; color: #1F2447; }
.ov-card .label { font-size: 11px; color: #999; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Main layout ── */
.main { display: flex; gap: 16px; padding: 0 32px 24px; height: calc(100vh - 190px); min-height: 560px; }
.panel-left {
  flex: 1;
  background: #FEFDF8;
  border-radius: 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-right { width: 440px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }

/* ── Keyword Network ── */
.network-header {
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 600;
  color: #1F2447;
  border-bottom: 1px solid #D9DEE7;
  flex-shrink: 0;
}
#network-chart { flex: 1; min-height: 0; }

/* ── Detail Panel ── */
.detail-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05); padding: 20px; }
.detail-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #1F2447; }
.detail-card .keyword-name { display: inline-block; background: #534AB7; color: #fff; padding: 5px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 14px; }
.detail-stats { display: flex; gap: 20px; margin-bottom: 14px; }
.detail-stats .stat { text-align: center; }
.detail-stats .stat .num { font-size: 22px; font-weight: 700; color: #1F2447; }
.detail-stats .stat .tag { font-size: 11px; color: #888; margin-top: 2px; }
.related-kws { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.related-kws .kw-tag { background: #EEE8F6; color: #3C3489; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; transition: all .15s; }
.related-kws .kw-tag:hover { background: #534AB7; color: #fff; }
.trend-section-label { font-size: 12px; color: #888; margin-bottom: 8px; }
#trend-chart { width: 100%; height: 220px; }

/* ── Linked Papers ── */
.papers-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05); padding: 20px; }
.papers-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #1F2447; }
.paper-item { border: 1px solid #D9DEE7; border-radius: 8px; padding: 14px; margin-bottom: 10px; transition: border-color .2s; }
.paper-item:hover { border-color: #7B5AA5; }
.paper-item .p-title { font-size: 14px; font-weight: 600; color: #1F2447; margin-bottom: 4px; cursor: pointer; }
.paper-item .p-title:hover { color: #7B5AA5; }
.paper-item .p-summary { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 8px; }
.paper-item .p-meta { display: flex; gap: 8px; align-items: center; }
.paper-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.badge-rec { background: #e8f5e9; color: #2e7d32; }
.badge-rel { background: #e3f2fd; color: #1565c0; }
.badge-nov { background: #fff3e0; color: #e65100; }
.p-btn { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; text-decoration: none; cursor: pointer; border: none; }
.btn-arxiv { background: #b10606; color: #fff; }
.btn-notion { background: #f5f5f5; color: #333; }

.placeholder { color: #999; font-size: 13px; text-align: center; padding: 40px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>Paper Exploration Dashboard</h1>
  <div class="subtitle">点击关键词网络中的节点，探索主题关系和论文推荐</div>
</div>

<div class="overview">
  <div class="ov-card"><div class="value" id="ov-total">-</div><div class="label">论文总数</div></div>
  <div class="ov-card"><div class="value" id="ov-keyword">-</div><div class="label">最热关键词</div></div>
  <div class="ov-card"><div class="value" id="ov-community">-</div><div class="label">最活跃社区 / 分类</div></div>
  <div class="ov-card"><div class="value" id="ov-quality">-</div><div class="label">高推荐论文 (≥7)</div></div>
</div>

<div class="main">
  <div class="panel-left">
    <div class="network-header">关键词共现网络 | Keyword Co-occurrence Network</div>
    <div id="network-chart"></div>
  </div>
  <div class="panel-right">
    <div class="detail-card" id="detail-panel">
      <h3>主题详情 | Topic Detail</h3>
      <div class="placeholder" id="detail-placeholder">← 点击左侧网络中的关键词节点查看详情</div>
      <div id="detail-content" style="display:none;">
        <div class="keyword-name" id="detail-kw-name"></div>
        <div class="detail-stats">
          <div class="stat"><div class="num" id="detail-kw-count">0</div><div class="tag">相关论文</div></div>
          <div class="stat"><div class="num" id="detail-kw-freq">0</div><div class="tag">出现频次</div></div>
        </div>
        <div class="trend-section-label">关联关键词</div>
        <div class="related-kws" id="detail-related"></div>
        <div class="trend-section-label">话题趋势 | Topic Presence</div>
        <div id="trend-chart"></div>
      </div>
    </div>
    <div class="papers-card" id="papers-panel">
      <h3>推荐论文 | Linked Papers</h3>
      <div class="placeholder" id="papers-placeholder">← 点击关键词查看相关论文</div>
      <div id="papers-content"></div>
    </div>
  </div>
</div>

<script>
// ═══ 数据（由 Python 端注入） ═══
const PAPERS = {{ papers | tojson }};
const GRAPH_DATA = {{ graph_data | tojson }};
const OVERVIEW = {{ overview | tojson }};
const NOTION_MAP = {{ notion_map | tojson }};
const TRENDS = {{ trends | tojson }};

// ═══ Overview ═══
document.getElementById('ov-total').textContent = OVERVIEW.total_papers;
document.getElementById('ov-keyword').textContent = OVERVIEW.hottest_keyword || 'N/A';
document.getElementById('ov-community').textContent = OVERVIEW.most_active_community || 'N/A';
document.getElementById('ov-quality').textContent = OVERVIEW.high_quality_count;

// ═══ Keyword Network ═══
const networkDom = document.getElementById('network-chart');
const networkChart = echarts.init(networkDom);

// 延迟 resize 确保容器渲染完毕
window.addEventListener('resize', () => { networkChart.resize(); });

const maxFreq = Math.max(...GRAPH_DATA.nodes.map(n => n.value), 1);
function getNodeColor(value) {
  const ratio = value / maxFreq;
  if (ratio >= 0.6)  return { fill: '#4A3F8C', stroke: '#3C3380' };
  if (ratio >= 0.35) return { fill: '#8E7DC0', stroke: '#7A69B0' };
  return                    { fill: '#C4BCE5', stroke: '#A99DD4' };
}
function getTextColor(value) {
  return '#26215C';
}

const nodes = GRAPH_DATA.nodes.map(n => {
  const c = getNodeColor(n.value);
  return {
    ...n,
    symbolSize: 24 + (n.value / maxFreq) * 48,
    label: {
      show: true,
      fontSize: 10 + (n.value / maxFreq) * 5,
      fontFamily: 'Georgia, "Times New Roman", serif',
      color: getTextColor(n.value),
      fontWeight: (n.value / maxFreq) >= 0.35 ? 'bold' : 'normal',
    },
    itemStyle: { color: c.fill, borderColor: c.stroke, borderWidth: 1.5, opacity: 0.88 },
  };
});

networkChart.setOption({
  tooltip: { formatter: (p) => p.dataType === 'node' ? `<b>${p.name}</b><br/>频次: ${p.value}` : `${p.data.source} ↔ ${p.data.target}` },
  series: [{
    type: 'graph', layout: 'force', roam: true, draggable: true,
    force: { repulsion: 480, edgeLength: [150, 350], gravity: 0.08 },
    data: nodes,
    links: GRAPH_DATA.edges.map(e => ({
      source: e.source, target: e.target,
      lineStyle: { width: Math.min(e.weight, 3), opacity: 0.55, color: '#9E94CC' },
    })),
    emphasis: {
      focus: 'adjacency',
      lineStyle: { width: 4, opacity: 0.7, color: '#534AB7' },
      itemStyle: { shadowBlur: 10, shadowColor: 'rgba(83,74,183,0.35)' },
    },
  }],
});

// ═══ Click → Detail Panel + Papers ═══
networkChart.on('click', function(params) {
  if (params.dataType !== 'node') return;
  selectKeyword(params.name);
});

function selectKeyword(keyword) {
  document.getElementById('detail-placeholder').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';
  document.getElementById('detail-kw-name').textContent = keyword;

  const relatedPapers = PAPERS.filter(p => (p.keywords || []).includes(keyword));
  document.getElementById('detail-kw-count').textContent = relatedPapers.length;

  const freq = (GRAPH_DATA.nodes.find(n => n.name === keyword) || {}).value || 0;
  document.getElementById('detail-kw-freq').textContent = freq;

  // 关联关键词
  const relatedKws = new Map();
  relatedPapers.forEach(p => {
    (p.keywords || []).forEach(kw => {
      if (kw !== keyword) relatedKws.set(kw, (relatedKws.get(kw) || 0) + 1);
    });
  });
  const sortedRelated = [...relatedKws.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8);
  const relatedDiv = document.getElementById('detail-related');
  relatedDiv.innerHTML = sortedRelated.map(([kw, c]) =>
    `<span class="kw-tag" onclick="selectKeyword('${kw.replace(/'/g, "\\'")}')">${kw} (${c})</span>`
  ).join('');

  renderTrend(keyword, relatedPapers);

  // 推荐论文
  document.getElementById('papers-placeholder').style.display = 'none';
  const sorted = relatedPapers.sort((a, b) => (b.recommendation_score || 0) - (a.recommendation_score || 0));
  const papersDiv = document.getElementById('papers-content');
  papersDiv.innerHTML = sorted.slice(0, 10).map(p => {
    const nUrl = NOTION_MAP[p.paper_id];
    const rec = (p.recommendation_score || 0).toFixed(1);
    return `<div class="paper-item">
      <div class="p-title" onclick="window.open('${p.url}')">${p.title}</div>
      <div class="p-summary">${p.one_line_summary || ''}</div>
      <div class="p-meta">
        <span class="paper-badge badge-rec">★ ${rec}</span>
        <span class="paper-badge badge-rel">R ${p.relevance_score}</span>
        <span class="paper-badge badge-nov">N ${p.novelty_score}</span>
        <a class="p-btn btn-arxiv" href="${p.url}" target="_blank">arXiv</a>
        ${nUrl ? `<a class="p-btn btn-notion" href="${nUrl}" target="_blank">Open in Notion</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ═══ Trend Chart ═══
const trendDom = document.getElementById('trend-chart');
const trendChart = echarts.init(trendDom);
window.addEventListener('resize', () => trendChart.resize());

function renderTrend(keyword, relatedPapers) {
  if (TRENDS && TRENDS[keyword]) {
    const data = TRENDS[keyword];
    trendChart.setOption({
      tooltip: { trigger: 'axis', borderColor: '#ddd' },
      xAxis: {
        type: 'category', data: data.dates,
        axisLine: { lineStyle: { color: '#ccc' } },
        axisTick: { show: false },
        axisLabel: { fontSize: 10, color: '#888' },
      },
      yAxis: {
        type: 'value', name: '论文数',
        nameTextStyle: { fontSize: 10, color: '#888' },
        splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
        axisLabel: { fontSize: 10, color: '#888' },
      },
      series: [{
        type: 'line', data: data.counts, smooth: true,
        symbol: 'circle', symbolSize: 6,
        lineStyle: { color: '#534AB7', width: 2 },
        itemStyle: { color: '#534AB7', borderColor: '#fff', borderWidth: 2 },
        areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1, [
          { offset: 0, color: 'rgba(83,74,183,0.15)' },
          { offset: 1, color: 'rgba(83,74,183,0.02)' }
        ])},
      }],
      grid: { top: 20, right: 20, bottom: 24, left: 42 },
    }, true);
  } else {
    const groups = {};
    relatedPapers.forEach(p => {
      const key = p.category || p.community_label || 'Other';
      groups[key] = (groups[key] || 0) + 1;
    });
    const entries = Object.entries(groups).sort((a, b) => b[1] - a[1]);
    trendChart.setOption({
      tooltip: { borderColor: '#ddd' },
      xAxis: {
        type: 'category', data: entries.map(e => e[0]),
        axisLine: { lineStyle: { color: '#ccc' } },
        axisTick: { show: false },
        axisLabel: { fontSize: 10, color: '#888', rotate: entries.length > 4 ? 25 : 0 },
      },
      yAxis: {
        type: 'value', name: '论文数',
        nameTextStyle: { fontSize: 10, color: '#888' },
        splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
        axisLabel: { fontSize: 10, color: '#888' },
      },
      series: [{
        type: 'bar', data: entries.map(e => e[1]),
        itemStyle: {
          color: new echarts.graphic.LinearGradient(0,0,0,1, [
            { offset: 0, color: '#534AB7' },
            { offset: 1, color: '#8E7DC0' }
          ]),
          borderRadius: [6,6,0,0],
        },
        emphasis: { itemStyle: { color: '#4A3F8C' } },
      }],
      grid: { top: 12, right: 20, bottom: 32, left: 42 },
    }, true);
  }
}
</script>

</body>
</html>
