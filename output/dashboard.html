<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Topic Exploration Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f6fa; color: #2d3436; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 32px; }
.header h1 { font-size: 22px; font-weight: 600; }
.header .subtitle { font-size: 13px; opacity: .65; margin-top: 4px; }

/* Overview cards */
.overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px 32px; }
.ov-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); text-align: center; }
.ov-card .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
.ov-card .label { font-size: 12px; color: #888; margin-top: 4px; }

/* Main layout */
.main { display: flex; gap: 16px; padding: 0 32px 24px; height: calc(100vh - 210px); min-height: 560px; }
.panel-left { flex: 1; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
.panel-right { width: 380px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }

/* Keyword network panel */
.network-header { padding: 14px 20px; font-size: 14px; font-weight: 600; border-bottom: 1px solid #eee; }
#network-chart { flex: 1; min-height: 400px; }

/* Detail panel */
.detail-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 20px; }
.detail-card h3 { font-size: 16px; margin-bottom: 12px; color: #1a1a2e; }
.detail-card .keyword-name { display: inline-block; background: #6c5ce7; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 14px; margin-bottom: 12px; }
.detail-stats { display: flex; gap: 16px; margin-bottom: 12px; }
.detail-stats .stat { text-align: center; }
.detail-stats .stat .num { font-size: 20px; font-weight: 700; color: #6c5ce7; }
.detail-stats .stat .tag { font-size: 11px; color: #888; }
.related-kws { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.related-kws .kw-tag { background: #eee; padding: 3px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; transition: background .2s; }
.related-kws .kw-tag:hover { background: #6c5ce7; color: #fff; }
#trend-chart { width: 100%; height: 180px; }

/* Linked papers */
.papers-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 20px; }
.papers-card h3 { font-size: 16px; margin-bottom: 12px; color: #1a1a2e; }
.paper-item { border: 1px solid #eee; border-radius: 8px; padding: 14px; margin-bottom: 10px; transition: border-color .2s; }
.paper-item:hover { border-color: #6c5ce7; }
.paper-item .p-title { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; cursor: pointer; }
.paper-item .p-title:hover { color: #6c5ce7; }
.paper-item .p-summary { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 8px; }
.paper-item .p-meta { display: flex; gap: 8px; align-items: center; }
.paper-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.badge-rec { background: #e8f5e9; color: #2e7d32; }
.badge-rel { background: #e3f2fd; color: #1565c0; }
.badge-nov { background: #fff3e0; color: #e65100; }
.p-btn { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; text-decoration: none; cursor: pointer; border: none; }
.btn-arxiv { background: #b10606; color: #fff; }
.btn-notion { background: #f5f5f5; color: #333; }

/* Placeholder state */
.placeholder { color: #999; font-size: 13px; text-align: center; padding: 40px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>Topic Exploration Dashboard</h1>
  <div class="subtitle">点击关键词网络中的节点，探索主题关系和论文推荐</div>
</div>

<div class="overview">
  <div class="ov-card"><div class="value" id="ov-total">-</div><div class="label">论文总数</div></div>
  <div class="ov-card"><div class="value" id="ov-keyword">-</div><div class="label">最热关键词</div></div>
  <div class="ov-card"><div class="value" id="ov-community">-</div><div class="label">最活跃社区 / 分类</div></div>
  <div class="ov-card"><div class="value" id="ov-quality">-</div><div class="label">高推荐论文 (≥7)</div></div>
</div>

<div class="main">
  <div class="panel-left">
    <div class="network-header">关键词共现网络 | Keyword Co-occurrence Network</div>
    <div id="network-chart"></div>
  </div>
  <div class="panel-right">
    <div class="detail-card" id="detail-panel">
      <h3>主题详情 | Topic Detail</h3>
      <div class="placeholder" id="detail-placeholder">← 点击左侧网络中的关键词节点查看详情</div>
      <div id="detail-content" style="display:none;">
        <div class="keyword-name" id="detail-kw-name"></div>
        <div class="detail-stats">
          <div class="stat"><div class="num" id="detail-kw-count">0</div><div class="tag">相关论文</div></div>
          <div class="stat"><div class="num" id="detail-kw-freq">0</div><div class="tag">出现频次</div></div>
        </div>
        <div style="font-size:12px;color:#888;margin-bottom:6px;">关联关键词</div>
        <div class="related-kws" id="detail-related"></div>
        <div style="font-size:12px;color:#888;margin-bottom:6px;">话题趋势 | Topic Presence</div>
        <div id="trend-chart"></div>
      </div>
    </div>
    <div class="papers-card" id="papers-panel">
      <h3>推荐论文 | Linked Papers</h3>
      <div class="placeholder" id="papers-placeholder">← 点击关键词查看相关论文</div>
      <div id="papers-content"></div>
    </div>
  </div>
</div>

function selectKeyword(keyword) {
  // 显示 detail
  document.getElementById('detail-placeholder').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';
  document.getElementById('detail-kw-name').textContent = keyword;

  // 统计相关论文
  const relatedPapers = PAPERS.filter(p => (p.keywords || []).includes(keyword));
  document.getElementById('detail-kw-count').textContent = relatedPapers.length;

  const freq = (GRAPH_DATA.nodes.find(n => n.name === keyword) || {}).value || 0;
  document.getElementById('detail-kw-freq').textContent = freq;

  // 关联关键词
  const relatedKws = new Map();
  relatedPapers.forEach(p => {
    (p.keywords || []).forEach(kw => {
      if (kw !== keyword) relatedKws.set(kw, (relatedKws.get(kw) || 0) + 1);
    });
  });
  const sortedRelated = [...relatedKws.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8);
  const relatedDiv = document.getElementById('detail-related');
  relatedDiv.innerHTML = sortedRelated.map(([kw, c]) =>
    `<span class="kw-tag" onclick="selectKeyword('${kw.replace(/'/g, "\\'")}')">${kw} (${c})</span>`
  ).join('');

  // 趋势图
  renderTrend(keyword, relatedPapers);

  // 推荐论文
  document.getElementById('papers-placeholder').style.display = 'none';
  const sorted = relatedPapers.sort((a, b) => (b.recommendation_score || 0) - (a.recommendation_score || 0));
  const papersDiv = document.getElementById('papers-content');
  papersDiv.innerHTML = sorted.slice(0, 10).map(p => {
    const nUrl = NOTION_MAP[p.paper_id];
    const rec = (p.recommendation_score || 0).toFixed(1);
    return `<div class="paper-item">
      <div class="p-title" onclick="window.open('${p.url}')">${p.title}</div>
      <div class="p-summary">${p.one_line_summary || ''}</div>
      <div class="p-meta">
        <span class="paper-badge badge-rec">★ ${rec}</span>
        <span class="paper-badge badge-rel">R ${p.relevance_score}</span>
        <span class="paper-badge badge-nov">N ${p.novelty_score}</span>
        <a class="p-btn btn-arxiv" href="${p.url}" target="_blank">arXiv</a>
        ${nUrl ? `<a class="p-btn btn-notion" href="${nUrl}" target="_blank">Open in Notion</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ═══ Trend Chart ═══
const trendDom = document.getElementById('trend-chart');
const trendChart = echarts.init(trendDom);
window.addEventListener('resize', () => trendChart.resize());

function renderTrend(keyword, relatedPapers) {
  // 有历史数据 → 折线图；否则 → 当前批次分布
  if (TRENDS && TRENDS[keyword]) {
    const data = TRENDS[keyword];
    trendChart.setOption({
      tooltip: { trigger: 'axis' },
      xAxis: { type: 'category', data: data.dates, axisLabel: { fontSize: 10 } },
      yAxis: { type: 'value', name: '论文数', nameTextStyle: { fontSize: 10 } },
      series: [{ type: 'line', data: data.counts, smooth: true, symbol: 'circle', symbolSize: 4 }],
      grid: { top: 20, right: 12, bottom: 20, left: 36 },
    }, true);
  } else {
    // fallback：按月/按 community 分组
    const groups = {};
    relatedPapers.forEach(p => {
      const key = p.category || p.community_label || 'Other';
      groups[key] = (groups[key] || 0) + 1;
    });
    const entries = Object.entries(groups).sort((a, b) => b[1] - a[1]);
    trendChart.setOption({
      tooltip: {},
      xAxis: { type: 'category', data: entries.map(e => e[0]), axisLabel: { fontSize: 9, rotate: 30 } },
      yAxis: { type: 'value', name: '论文数' },
      series: [{ type: 'bar', data: entries.map(e => e[1]), itemStyle: { color: '#6c5ce7', borderRadius: [4,4,0,0] } }],
      grid: { top: 12, right: 12, bottom: 32, left: 36 },
    }, true);
  }
}
